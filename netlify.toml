[build]
  publish = "."
  command = "npm run test:e2e"

[[redirects]]
  from = "/django-trabalhe-conosco/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/django-trabalhe-conosco"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/nextjs-trabalhe-conosco/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/nextjs-trabalhe-conosco"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/database/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/database"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/includes/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/includes"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/candidatar/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/candidatar"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/trabalhe-conosco/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/trabalhe-conosco"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.php"
  to = "/index.html"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
