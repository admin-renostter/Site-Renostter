{% extends "careers/base.html" %}

{% block title %}Recuperar senha | Renostter{% endblock %}

{% block content %}
  <section class="careers-auth">
    <div class="careers-form-panel">
      <p class="careers-kicker">Acesso RH</p>
      <h1>Recuperar senha</h1>
      <p class="careers-login-note">Informe o e-mail cadastrado para receber o link de redefinicao.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label><span>{{ form.email.label }}</span>{{ form.email }}</label>
        <button class="careers-button" type="submit">Enviar link</button>
        <a class="careers-button careers-button-ghost" href="{% url 'login' %}">Voltar ao login</a>
      </form>
    </div>
  </section>
{% endblock %}
