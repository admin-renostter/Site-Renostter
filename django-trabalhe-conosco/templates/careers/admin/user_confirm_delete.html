{% extends "careers/base.html" %}

{% block title %}Excluir usuario | Painel RH{% endblock %}

{% block content %}
  <section class="careers-auth">
    <div class="careers-form-panel">
      <p class="careers-kicker">Usuario master</p>
      <h1>Excluir usuario</h1>
      <p>Confirme a exclusao de <strong>{{ object.username }}</strong>. Esta acao remove o acesso deste usuario ao painel RH.</p>
      <form method="post">
        {% csrf_token %}
        <button class="careers-button" type="submit">Confirmar exclusao</button>
        <a class="careers-button careers-button-ghost" href="{% url 'careers:user_list' %}">Cancelar</a>
      </form>
    </div>
  </section>
{% endblock %}
